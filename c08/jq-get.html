<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript &amp; jQuery - Chapter 8: Ajax &amp; JSON - .get()</title>
    <link rel="stylesheet" href="css/c08.css" />
  </head>
  <body>

    <header><h1>THE MAKER BUS</h1></header>
    <section id="content">
      <h2>Vote for a t-shirt.</h2>
      <p id="selector">Select which color t-shirt you want to see this year:
        <div id="vote">
          <div class="third">
            <a href="http://example.org?tshirt=gray">
              <img src="img/t-gray.png" id="gray" alt="gray" />
            </a>
          </div>
          <div class="third">
            <a href="http://example.org?tshirt=yellow" id="yellow">
              <img src="img/t-yellow.png" id="yellow" alt="yellow" />
            </a>
          </div>
          <div class="third">
            <a href="http://example.org?tshirt=green">
              <img src="img/t-green.png" id="green" alt="green" />
            </a>
          </div>
        </div>
      </p>
    </section>

    <script src="js/jquery-4.0.0.js"></script>
    <script src="js/jq-get.js"></script>
  </body>
</html>
